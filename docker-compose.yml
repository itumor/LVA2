services:
  stt:
    build:
      context: .
      dockerfile: stt-service/Dockerfile
    container_name: vvpp-stt
    environment:
      STT_DEVICE: ${STT_DEVICE:-cpu}
      STT_COMPUTE_TYPE: ${STT_COMPUTE_TYPE:-int8}
      HF_HOME: /cache/hf
    ports:
      - "5003:5003"
    volumes:
      - stt_cache:/cache
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:5003/health', timeout=5)\"",
        ]
      interval: 15s
      timeout: 5s
      retries: 30

  tts:
    build:
      context: .
      dockerfile: tts-service/Dockerfile
    container_name: vvpp-tts
    environment:
      PIPER_MODEL_DIR: /models
      PIPER_DEFAULT_VOICE: ${TTS_DEFAULT_VOICE:-lv_LV-aivars-medium}
    volumes:
      - ./tts-models:/models
      - tts_cache:/cache
    ports:
      - "5001:5001"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:5001/health', timeout=5)\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 30

  db:
    image: postgres:16-alpine
    container_name: vvpp-db
    environment:
      POSTGRES_DB: vvpp_a2
      POSTGRES_USER: vvpp
      POSTGRES_PASSWORD: vvpp
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vvpp -d vvpp_a2"]
      interval: 5s
      timeout: 5s
      retries: 20

  minio:
    image: minio/minio:latest
    container_name: vvpp-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc:latest
    container_name: vvpp-minio-init
    depends_on:
      minio:
        condition: service_started
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 minioadmin minioadmin; do sleep 2; done;
      mc mb local/vvpp-recordings --ignore-existing;
      exit 0;
      "

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vvpp-web
    depends_on:
      tts:
        condition: service_healthy
      stt:
        condition: service_healthy
      db:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      DATABASE_URL: postgresql://vvpp:vvpp@db:5432/vvpp_a2?schema=public
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      MINIO_BUCKET: vvpp-recordings
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_EVALUATOR_MODEL: ${OPENAI_EVALUATOR_MODEL:-gpt-4o-mini}
      TTS_ENABLED: ${TTS_ENABLED:-true}
      TTS_PROVIDER: ${TTS_PROVIDER:-piper}
      TTS_PIPER_BASE_URL: ${TTS_PIPER_BASE_URL:-http://tts:5001}
      TTS_DEFAULT_VOICE: ${TTS_DEFAULT_VOICE:-lv_LV-aivars-medium}
      TTS_CACHE_DIR: ${TTS_CACHE_DIR:-/app/public/tts-cache}
      TTS_MAX_TEXT_CHARS: ${TTS_MAX_TEXT_CHARS:-500}
      TTS_MODEL_DIR: ${TTS_MODEL_DIR:-/models}
      STT_BASE_URL: ${STT_BASE_URL:-http://stt:5003}
    ports:
      - "3000:3000"
    volumes:
      - tts_cache:/app/public/tts-cache
      - ./tts-models:/models:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:3000/api/health >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 30

volumes:
  pg_data:
  minio_data:
  tts_cache:
  stt_cache:
